version: '3.4'

services:
  soundwords:
    image: ${DOCKER_REGISTRY-}soundwords
    build:
      context: .
      dockerfile: SoundWords/Dockerfile
    environment:
      # --- Database ---
      # CONNECTION_STRING / CONNECTION_STRING_USERS are Docker secrets in
      # prod (see `secrets:` below); the app loads them from /run/secrets via
      # AddDockerSecrets() in Program.cs. The override file may shadow with
      # plain env vars for local dev.
      - DB_TYPE=${DB_TYPE-MySQL}

      # --- Site identity ---
      - SITE_NAME=${SITE_NAME-}
      - SITE_URL=${SITE_URL-}
      - PROTOCOL=${PROTOCOL-https}
      - COMPANY_NAME=${COMPANY_NAME-}
      - COMPANY_EMAIL=${COMPANY_EMAIL-}
      - SLOGAN=${SLOGAN-}
      - META_DESCRIPTION=${META_DESCRIPTION-}
      - LOGO_PATH=${LOGO_PATH-}
      - SHOW_LATEST_ALBUMS=${SHOW_LATEST_ALBUMS-true}

      # --- Filesystem paths inside the container ---
      - RECORDINGS_FOLDER=${RECORDINGS_FOLDER-/var/audio/public}
      - RECORDINGS_FOLDER_RESTRICTED=${RECORDINGS_FOLDER_RESTRICTED-/var/audio/restricted}
      - CACHE_PATH=${CACHE_PATH-/var/cache}
      - CUSTOM_FOLDER=${CUSTOM_FOLDER-/var/custom}

      # --- Media host (MinIO / S3-compatible) ---
      # MEDIA_URL is the public base URL embedded in RSS enclosures and on-page audio
      # tags. S3_ENDPOINT is what the app uses to sign restricted-bucket URLs — must
      # match the Host the browser ultimately hits so the V4 signature verifies.
      # S3_ACCESS_KEY / S3_SECRET_KEY are Docker secrets in prod (see `secrets:`).
      - MEDIA_URL=${MEDIA_URL-}
      - S3_ENDPOINT=${S3_ENDPOINT-}
      - S3_PUBLIC_BUCKET=${S3_PUBLIC_BUCKET-public}
      - S3_RESTRICTED_BUCKET=${S3_RESTRICTED_BUCKET-restricted}
      - SIGNED_URL_LIFETIME_MINUTES=${SIGNED_URL_LIFETIME_MINUTES-120}

      # --- Optional integrations ---
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID-}
      - PIWIK_ENABLED=${PIWIK_ENABLED-false}
      - PIWIK_HOST=${PIWIK_HOST-}
      - PIWIK_DOMAINS=${PIWIK_DOMAINS-}
      - PIWIK_SITE_ID=${PIWIK_SITE_ID-}

      # --- Structured logging (Seq) — set SEQ_URL to enable. ---
      # SEQ_API_KEY is a Docker secret in prod (see `secrets:` below).
      - SEQ_URL=${SEQ_URL-}

      # --- Podcast feed iTunes categories (paired) ---
      - PODCAST_CATEGORIES__0=${PODCAST_CATEGORIES__0-}
      - PODCAST_SUBCATEGORIES__0=${PODCAST_SUBCATEGORIES__0-}
    # Docker secrets are mounted at /run/secrets/<NAME>; the app picks them up via
    # AddDockerSecrets() so they override env vars and stay out of `docker inspect`.
    # The override file may redeclare these with `file:` for local dev.
    secrets:
      - CONNECTION_STRING
      - CONNECTION_STRING_USERS
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - SEQ_API_KEY
    # Traefik labels are inert unless a Traefik instance is configured to scan this
    # compose project. SITE_HOST routes the main app; MEDIA_HOST is the media
    # subdomain where /feed/* goes to the app and the bucket paths go to MinIO.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soundwords.rule=Host(`${SITE_HOST-localhost}`)"
      - "traefik.http.routers.soundwords.entrypoints=websecure"
      - "traefik.http.routers.soundwords.tls.certresolver=letsencrypt"
      - "traefik.http.routers.soundwords-feed.rule=Host(`${MEDIA_HOST-media.localhost}`) && PathPrefix(`/feed`)"
      - "traefik.http.routers.soundwords-feed.entrypoints=websecure"
      - "traefik.http.routers.soundwords-feed.tls.certresolver=letsencrypt"
      - "traefik.http.services.soundwords.loadbalancer.server.port=8080"

# Default to swarm-managed external secrets; the dev override replaces these
# with `file:` references to committed throwaway values under secrets/dev/.
secrets:
  CONNECTION_STRING:
    external: true
  CONNECTION_STRING_USERS:
    external: true
  S3_ACCESS_KEY:
    external: true
  S3_SECRET_KEY:
    external: true
  SEQ_API_KEY:
    external: true
